---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-helm-chart-value-overrides
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: "Enabled"
data:
  values.yaml: |
    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 30Gi
        retention: 14d
        retentionSize: 24GB
        replicas: 1
        shards: 1
        resources:
          limits:
            memory: 2Gi
            cpu: 1000m
          requests:
            memory: 1Gi
            cpu: 500m
        enableRemoteWriteReceiver: true
        additionalScrapeConfigs: []
      
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: acme-issuer
          external-dns.alpha.kubernetes.io/target: homelab.yesidlopez.de
        hosts:
          - prometheus.homelab.yesidlopez.de
        tls:
          - secretName: prometheus-tls
            hosts:
              - prometheus.homelab.yesidlopez.de
    
    grafana:
      enabled: false
    
    alertmanager:
      alertmanagerSpec:
        # Allow cross-namespace AlertmanagerConfigs (e.g. prometheus/homelab-discord)
        # to match alerts from any namespace, not only the one they live in.
        alertmanagerConfigMatcherStrategy:
          type: None
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
        resources:
          limits:
            memory: 512Mi
            cpu: 200m
          requests:
            memory: 256Mi
            cpu: 100m
      
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: acme-issuer
          external-dns.alpha.kubernetes.io/target: homelab.yesidlopez.de
        hosts:
          - alertmanager.homelab.yesidlopez.de
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alertmanager.homelab.yesidlopez.de
    
    nodeExporter:
      enabled: true
      serviceMonitor:
        relabelings:
          - sourceLabels: [__meta_kubernetes_pod_node_name]
            targetLabel: instance
          - targetLabel: job
            replacement: node-exporter
    
    kubeStateMetrics:
      enabled: true

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          # Drop high-cardinality histogram buckets — dominant TSDB cost, rarely queried here.
          - sourceLabels: [__name__]
            regex: 'apiserver_request_duration_seconds_bucket|apiserver_response_sizes_bucket|apiserver_request_body_size_bytes_bucket|apiserver_response_body_size_bytes_bucket|etcd_request_duration_seconds_bucket'
            action: drop

    # K3s embeds these in the server process and doesn't expose the scrape endpoints;
    # leaving them on just produces failing targets with no metrics.
    kubeControllerManager:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false

    kubelet:
      enabled: true
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: 'rest_client_request_duration_seconds_bucket'
            action: drop
