---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-release
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
        namespace: flux-system
      version: 1.10.2
  interval: 5m
  timeout: 5m
  releaseName: longhorn-release
  valuesFrom:
    - kind: ConfigMap
      name: longhorn-values
