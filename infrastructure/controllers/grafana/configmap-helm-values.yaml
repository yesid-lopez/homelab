---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-helm-chart-value-overrides
  namespace: flux-system
data:
  values.yaml: |
    deploymentStrategy:
      type: Recreate
      rollingUpdate: null

    persistence:
      enabled: true
      storageClassName: longhorn
      size: 10Gi
    
    service:
      type: ClusterIP
      port: 80
    
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: acme-issuer
        external-dns.alpha.kubernetes.io/target: homelab.yesidlopez.de
      hosts:
        - grafana.yesidlopez.de
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.yesidlopez.de
    
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.prometheus:9090
          access: proxy
          isDefault: false
        - name: Loki
          type: loki
          url: http://loki-gateway.loki:80
          access: proxy
          isDefault: true
    
    defaultDashboardsEnabled: false

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'cluster'
          orgId: 1
          folder: 'Cluster'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/cluster
        - name: 'infrastructure'
          orgId: 1
          folder: 'Infrastructure'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/infrastructure
        - name: 'logs'
          orgId: 1
          folder: 'Logs'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/logs

    dashboardsConfigMaps:
      cluster: grafana-dashboard-homelab-k3s

    dashboards:
      cluster:
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Prometheus
      infrastructure:
        prometheus-overview:
          gnetId: 3662
          revision: 2
          datasource: Prometheus
        node-exporter-full:
          gnetId: 1860
          revision: 37
          datasource: Prometheus
        longhorn:
          gnetId: 16888
          revision: 11
          datasource:
            - name: datasource
              value: Prometheus
      logs:
        loki-logs:
          gnetId: 13639
          revision: 2
          datasource: Loki
