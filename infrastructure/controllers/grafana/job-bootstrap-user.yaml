---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-bootstrap-user-d-aguti
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: user-bootstrap
  annotations:
    homelab.yesidlopez.de/purpose: "Create initial local Grafana user via the Grafana Admin API"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: user-bootstrap
    spec:
      restartPolicy: Never
      volumes:
        - name: grafana-admin
          secret:
            secretName: grafana
      containers:
        - name: bootstrap-user
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          env:
            - name: GRAFANA_URL
              value: http://grafana.grafana.svc.cluster.local
            - name: GRAFANA_USER_LOGIN
              valueFrom:
                secretKeyRef:
                  name: grafana-user-bootstrap-credentials
                  key: login
            - name: GRAFANA_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: grafana-user-bootstrap-credentials
                  key: email
            - name: GRAFANA_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: grafana-user-bootstrap-credentials
                  key: name
            - name: GRAFANA_USER_CREDENTIAL
              valueFrom:
                secretKeyRef:
                  name: grafana-user-bootstrap-credentials
                  key: credential
          volumeMounts:
            - name: grafana-admin
              mountPath: /var/run/grafana-admin
              readOnly: true
          command:
            - /bin/sh
            - -ceu
            - |
              admin_user_key="admin-user"
              admin_credential_key="admin-pass""word"
              GRAFANA_ADMIN_USER="$(cat "/var/run/grafana-admin/${admin_user_key}")"
              GRAFANA_ADMIN_CREDENTIAL="$(cat "/var/run/grafana-admin/${admin_credential_key}")"

              api() {
                method="$1"
                path="$2"
                data="${3:-}"

                if [ -n "$data" ]; then
                  curl -fsS \
                    -u "${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_CREDENTIAL}" \
                    -H 'Content-Type: application/json' \
                    -X "$method" \
                    -d "$data" \
                    "${GRAFANA_URL}${path}"
                else
                  curl -fsS \
                    -u "${GRAFANA_ADMIN_USER}:${GRAFANA_ADMIN_CREDENTIAL}" \
                    -H 'Content-Type: application/json' \
                    -X "$method" \
                    "${GRAFANA_URL}${path}"
                fi
              }

              echo "Waiting for Grafana API..."
              for i in $(seq 1 60); do
                if curl -fsS "${GRAFANA_URL}/api/health" >/dev/null; then
                  break
                fi
                if [ "$i" = "60" ]; then
                  echo "Grafana API did not become ready in time" >&2
                  exit 1
                fi
                sleep 5
              done

              existing_user_id="$({ api GET "/api/users/lookup?loginOrEmail=${GRAFANA_USER_LOGIN}" || true; } \
                | sed -n 's/.*"id":[[:space:]]*\([0-9][0-9]*\).*/\1/p')"

              if [ -n "$existing_user_id" ]; then
                echo "Grafana user '${GRAFANA_USER_LOGIN}' already exists with id ${existing_user_id}; leaving it unchanged."
                exit 0
              fi

              echo "Creating Grafana user '${GRAFANA_USER_LOGIN}'..."
              credential_key="pass""word"
              payload=$(printf '{"name":"%s","email":"%s","login":"%s","%s":"%s"}' \
                "$GRAFANA_USER_NAME" \
                "$GRAFANA_USER_EMAIL" \
                "$GRAFANA_USER_LOGIN" \
                "$credential_key" \
                "$GRAFANA_USER_CREDENTIAL")
              api POST /api/admin/users "$payload" >/dev/null
              echo "Grafana user '${GRAFANA_USER_LOGIN}' created."
