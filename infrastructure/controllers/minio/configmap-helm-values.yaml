apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-helm-chart-value-overrides
  namespace: minio
data:
  values.yaml: |
    mode: standalone
    replicas: 1
    nodeSelector:
      kubernetes.io/arch: amd64
    existingSecret: minio-credentials
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi
      accessMode: ReadWriteOnce
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
    service:
      type: ClusterIP
      port: 9000
    consoleService:
      type: ClusterIP
      port: 9001
    ingress:
      enabled: false
    consoleIngress:
      enabled: false
    buckets:
      # payload-media is fronted by the media.luloai.com ingress and serves
      # public assets (case-study mockups, etc.) directly to the landing site.
      - name: payload-media
        policy: download
        purge: false
      # postgres-backups stays private — only CNPG / backup tooling reads it.
      - name: postgres-backups
        policy: none
        purge: false
      # multica-uploads is fronted by the media.multica.yesidlopez.de ingress.
      # Public because Multica's S3-backed storage has no presigned-URL or
      # backend-proxy path upstream yet (multica-ai/multica#2804, PR #2740);
      # protection relies on UUID-only keys (workspaces/<uuid>/<uuid>.png).
      - name: multica-uploads
        policy: download
        purge: false
    metrics:
      serviceMonitor:
        enabled: false
