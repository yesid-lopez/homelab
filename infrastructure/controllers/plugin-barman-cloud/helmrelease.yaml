apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
  namespace: cnpg-system
spec:
  interval: 30m
  chart:
    spec:
      chart: plugin-barman-cloud
      version: 0.6.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: plugin-barman-cloud-helm-chart-value-overrides
      valuesKey: values.yaml
