apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-status-api
  namespace: public-status-api
  labels:
    app: public-status-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-status-api
  template:
    metadata:
      labels:
        app: public-status-api
    spec:
      serviceAccountName: public-status-api
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: public-status-api
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/app.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: CACHE_TTL_SECONDS
              value: "30"
            - name: CORS_ALLOW_ORIGIN
              value: "https://www.yesidlopez.de"
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: app
          configMap:
            name: public-status-api-app
