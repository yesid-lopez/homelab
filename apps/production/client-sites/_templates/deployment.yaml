apiVersion: apps/v1
kind: Deployment
metadata:
  name: __CLIENT__
  namespace: lulo-demo-landings
  labels:
    app: __CLIENT__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __CLIENT__
  template:
    metadata:
      labels:
        app: __CLIENT__
        name: __CLIENT__
    spec:
      containers:
      - name: __CLIENT__
        image: "registry.yesidlopez.de/__CLIENT__:v0.0.1" # {"$imagepolicy": "lulo-demo-landings:__CLIENT__"}
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: NEXT_PUBLIC_UMAMI_SCRIPT_URL
          value: "https://umami.yesidlopez.de/script.js"
        - name: NEXT_PUBLIC_UMAMI_WEBSITE_ID
          valueFrom:
            configMapKeyRef:
              name: lulo-demo-preview-config
              key: umamiWebsiteId
        - name: DISCORD_DEMO_OPEN_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: lulo-demo-preview-webhook
              key: webhookUrl
              optional: true
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      imagePullSecrets:
        - name: registry-secret
