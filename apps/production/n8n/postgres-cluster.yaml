apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-postgres
  namespace: n8n
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-trixie

  inheritedMetadata:
    labels:
      # Pair required: `source` activates PVC→Volume label sync in Longhorn,
      # and the group label is what the RecurringJob actually matches on.
      recurring-job.longhorn.io/source: enabled
      recurring-job-group.longhorn.io/backup: enabled

  bootstrap:
    initdb:
      database: n8n
      owner: n8n

  storage:
    size: 10Gi
    storageClass: longhorn

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: n8n-postgres-store
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: n8n-postgres-store
  namespace: n8n
spec:
  configuration:
    destinationPath: s3://postgres-backups/n8n-postgres
    endpointURL: http://minio.minio.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        name: minio-backup-credentials
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: minio-backup-credentials
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
  retentionPolicy: "14d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-postgres-daily
  namespace: n8n
spec:
  schedule: "0 45 3 * * *"
  backupOwnerReference: self
  cluster:
    name: n8n-postgres
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
