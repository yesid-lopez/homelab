apiVersion: batch/v1
kind: CronJob
metadata:
  name: umami-weekly-report
  namespace: umami
spec:
  schedule: "0 8 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reporter
              image: python:3.11-alpine
              command: ["python3", "/scripts/report.py"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
              env:
                - name: UMAMI_USERNAME
                  value: admin
                - name: UMAMI_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: umami-admin-credentials
                      key: adminPassword
                - name: UMAMI_WEBSITE_NAME
                  value: "resumelo"
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: umami-discord-webhook
                      key: webhookUrl
          volumes:
            - name: script
              configMap:
                name: umami-weekly-report-script
                defaultMode: 0755
