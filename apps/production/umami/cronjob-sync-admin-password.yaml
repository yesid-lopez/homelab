apiVersion: batch/v1
kind: CronJob
metadata:
  name: umami-sync-admin-password
  namespace: umami
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync-password
              image: postgres:16-alpine
              env:
                - name: DB_HOST
                  value: umami-postgres-rw.umami.svc.cluster.local
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: umami-postgres-app
                      key: dbname
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: umami-postgres-app
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: umami-postgres-app
                      key: password
                - name: UMAMI_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: umami-admin-credentials
                      key: adminPassword
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  until pg_isready -h "$DB_HOST" -U "$DB_USER" -d "$DB_NAME"; do
                    sleep 5
                  done
                  export PGPASSWORD="$DB_PASSWORD"
                  psql \
                    -v ON_ERROR_STOP=1 \
                    -h "$DB_HOST" \
                    -U "$DB_USER" \
                    -d "$DB_NAME" \
                    -v admin_password="$UMAMI_ADMIN_PASSWORD" <<'SQL'
                  CREATE EXTENSION IF NOT EXISTS pgcrypto;
                  INSERT INTO "user" (user_id, username, password, role, created_at, updated_at)
                  VALUES (gen_random_uuid(), 'admin', crypt(:'admin_password', gen_salt('bf', 10)), 'admin', NOW(), NOW())
                  ON CONFLICT (username)
                  DO UPDATE SET
                    password = crypt(:'admin_password', gen_salt('bf', 10)),
                    role = 'admin',
                    updated_at = NOW();
                  SQL
