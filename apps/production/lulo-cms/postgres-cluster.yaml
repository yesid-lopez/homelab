apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: lulo-cms-postgres
  namespace: lulo
spec:
  instances: 1

  inheritedMetadata:
    labels:
      # Pair required: `source` activates PVC→Volume label sync in Longhorn,
      # and the group label is what the RecurringJob actually matches on.
      recurring-job.longhorn.io/source: enabled
      recurring-job-group.longhorn.io/backup: enabled

  bootstrap:
    initdb:
      database: lulo_cms
      owner: lulo_cms

  storage:
    size: 5Gi
    storageClass: longhorn

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  backup:
    barmanObjectStore:
      destinationPath: s3://postgres-backups/lulo-cms-postgres
      endpointURL: http://minio.minio.svc.cluster.local:9000
      s3Credentials:
        accessKeyId:
          name: minio-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: minio-backup-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: lulo-cms-postgres-daily
  namespace: lulo
spec:
  schedule: "0 0 3 * * *"
  backupOwnerReference: self
  cluster:
    name: lulo-cms-postgres
  immediate: true
