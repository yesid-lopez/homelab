apiVersion: v1
kind: ConfigMap
metadata:
  name: multica-helm-chart-value-overrides
  namespace: multica
  labels:
    reconcile.fluxcd.io/watch: "Enabled"
data:
  values.yaml: |
    backend:
      replicaCount: 1
      image:
        # renovate: datasource=docker depName=ghcr.io/multica-ai/multica-backend
        tag: v0.3.15
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
      extraEnv:
        - name: GITHUB_APP_SLUG
          value: "multica-luloai"
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: multica-app-secrets
              key: githubWebhookSecret
        - name: S3_BUCKET
          value: "multica-uploads"
        - name: S3_REGION
          value: "us-east-1"
        - name: AWS_ENDPOINT_URL
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-backup-credentials
              key: ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-backup-credentials
              key: ACCESS_SECRET_KEY
        # Public reader host for attachments. AWS_ENDPOINT_URL above stays
        # in-cluster for SDK uploads; this overrides the host written into
        # attachment URLs so browsers resolve them through the public
        # `media.multica.yesidlopez.de` ingress. Remove once
        # multica-ai/multica#2740 ships and the backend can proxy `/uploads/*`
        # from S3 directly.
        - name: CLOUDFRONT_DOMAIN
          value: "media.multica.yesidlopez.de"

    frontend:
      replicaCount: 1
      image:
        # renovate: datasource=docker depName=ghcr.io/multica-ai/multica-web
        tag: v0.3.15
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi

    config:
      appEnv: production
      appUrl: https://multica.yesidlopez.de
      frontendOrigin: https://multica.yesidlopez.de
      cookieDomain: ""
      allowSignup: "false"
      allowedEmails: "yesid.leonardo.lopez@hotmail.com,saraodrada@gmail.com"
      resendFromEmail: noreply@luloai.com

    secret:
      create: true

    persistence:
      enabled: false

    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: acme-issuer
        external-dns.alpha.kubernetes.io/target: homelab.yesidlopez.de
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      hosts:
        - host: multica.yesidlopez.de
          paths:
            - path: /api
              pathType: Prefix
              service: backend
            - path: /auth
              pathType: Prefix
              service: backend
            - path: /uploads
              pathType: Prefix
              service: backend
            - path: /ws
              pathType: Prefix
              service: backend
            - path: /health
              pathType: Prefix
              service: backend
            - path: /healthz
              pathType: Prefix
              service: backend
            - path: /readyz
              pathType: Prefix
              service: backend
            - path: /
              pathType: Prefix
              service: frontend
      tls:
        - hosts:
            - multica.yesidlopez.de
          secretName: multica-tls
