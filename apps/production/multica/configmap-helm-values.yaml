apiVersion: v1
kind: ConfigMap
metadata:
  name: multica-helm-chart-value-overrides
  namespace: multica
data:
  values.yaml: |
    backend:
      replicaCount: 1
      image:
        tag: v0.3.0
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 512Mi
      # Required so the uploads PVC is chgrp'd to gid 1000 on mount —
      # otherwise the non-root backend (runAsUser/Group 1000) gets EACCES
      # creating subdirectories under /app/data/uploads.
      podSecurityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      extraEnv:
        - name: GITHUB_APP_SLUG
          value: "multica-luloai"
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: multica-app-secrets
              key: githubWebhookSecret

    frontend:
      replicaCount: 1
      image:
        tag: v0.3.0
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi

    config:
      appEnv: production
      appUrl: https://multica.yesidlopez.de
      frontendOrigin: https://multica.yesidlopez.de
      cookieDomain: ""
      allowSignup: "false"
      allowedEmails: "yesid.leonardo.lopez@hotmail.com,saraodrada@gmail.com"
      resendFromEmail: noreply@luloai.com

    secret:
      create: true

    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi
      accessModes:
        - ReadWriteOnce

    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: acme-issuer
        external-dns.alpha.kubernetes.io/target: homelab.yesidlopez.de
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      hosts:
        - host: multica.yesidlopez.de
          paths:
            - path: /api
              pathType: Prefix
              service: backend
            - path: /auth
              pathType: Prefix
              service: backend
            - path: /uploads
              pathType: Prefix
              service: backend
            - path: /ws
              pathType: Prefix
              service: backend
            - path: /health
              pathType: Prefix
              service: backend
            - path: /healthz
              pathType: Prefix
              service: backend
            - path: /readyz
              pathType: Prefix
              service: backend
            - path: /
              pathType: Prefix
              service: frontend
      tls:
        - hosts:
            - multica.yesidlopez.de
          secretName: multica-tls
