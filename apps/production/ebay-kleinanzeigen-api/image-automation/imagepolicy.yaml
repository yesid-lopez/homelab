apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: ebay-kleinanzeigen-api
  namespace: ebay-kleinanzeigen-api
spec:
  imageRepositoryRef:
    name: ebay-kleinanzeigen-api
  policy:
    semver:
      range: ">=1.0.0"
  filterTags:
    pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$0'
